worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;

    # --- camera-admin.evoxr.jp ---
    server {
        listen 80;
        server_name camera-admin.evoxr.jp;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name camera-admin.evoxr.jp;

        ssl_certificate /etc/letsencrypt/live/camera-admin.evoxr.jp/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/camera-admin.evoxr.jp/privkey.pem;

        client_max_body_size 10M;

        location = / {
            return 302 /admin/;
        }

        location /mqtt {
            proxy_pass http://mosquitto:9001/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        location / {
            proxy_pass http://app:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # --- camera-app.evoxr.jp ---
    server {
        listen 80;
        server_name camera-app.evoxr.jp;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name camera-app.evoxr.jp;

        ssl_certificate /etc/letsencrypt/live/camera-app.evoxr.jp/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/camera-app.evoxr.jp/privkey.pem;

        client_max_body_size 10M;

        location = / {
            return 302 /client/;
        }

        location /mqtt {
            proxy_pass http://mosquitto:9001/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        location / {
            proxy_pass http://app:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
