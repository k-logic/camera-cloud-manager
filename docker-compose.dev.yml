services:
  app:
    build: .
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      mosquitto:
        condition: service_started
    env_file: .env.dev
    restart: always

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cloudmgr
      POSTGRES_PASSWORD: cloudmgr
      POSTGRES_DB: cloud_manager
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudmgr -d cloud_manager"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  mosquitto:
    image: eclipse-mosquitto:2
    expose:
      - "1883"
      - "9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf
    depends_on:
      - app
      - mosquitto
    restart: always

volumes:
  pgdata:
