services:
  app:
    build: .
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      mosquitto:
        condition: service_started
    env_file: .env.prod
    restart: always

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cloudmgr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cloudmgr}
      POSTGRES_DB: cloud_manager
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudmgr -d cloud_manager"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  mosquitto:
    image: eclipse-mosquitto:2
    expose:
      - "1883"
      - "9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    depends_on:
      - app
      - mosquitto
    restart: always

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew; done'"
    restart: always

volumes:
  pgdata:
  certbot-webroot:
  certbot-certs:
